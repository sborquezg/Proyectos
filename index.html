<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .card-tasks { display: none; padding: 0 1rem 0.75rem 1rem; border-top: 0.5px solid var(--border); }

  .cat-add-row button:hover { color: var(--text); }
  .modal-foot { display: flex; justify-content: flex-end; gap: 14px; margin-top: 4px; }
  .modal-foot button { font-size: 13px; background: none; border: none; cursor: pointer; color: var(--text-tertiary); padding: 0; font-family: var(--font); }
  .modal-foot .confirm { color: var(--text); font-weight: 500; }
  .cat-panel { margin-bottom: 1.2rem; padding: 0.75rem 1rem; border: 0.5px solid var(--border); border-radius: var(--radius); }
  .cat-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }

  }
</style>

<script>
const SUPA_URL = 'https://sytdliahcbqhkymxwidz.supabase.co';
const SUPA_KEY = 'sb_publishable_ooitirO9Tjx9BysQknVNEg_d2XMHUPV';

const headers = {
  'Content-Type': 'application/json',
  'apikey': SUPA_KEY,
  'Authorization': `Bearer ${SUPA_KEY}`,
  'Prefer': 'return=representation'
};

const api = async (path, method='GET', body=null) => {
  const opts = { method, headers: {...headers} };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  if(!r.ok) { const e = await r.text(); throw new Error(e); }
  if(r.status === 204) return null;
  return r.json();
};

const uid = () => Math.random().toString(36).slice(2,10);
let ps = [], cats = [];
let fs = {s:'all', c:'all'};

function sortTasks(tasks) {
  return tasks.sort((a, b) => {
    if(a.done !== b.done) return a.done - b.done;
    if(!a.done) {
      if(a.dl && b.dl) return a.dl < b.dl ? -1 : a.dl > b.dl ? 1 : 0;
      if(a.dl) return -1;
      if(b.dl) return 1;
    }
    return 0;
  });
}

function setSyncDot(state) {
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot ' + state;
}

async function loadAll() {
  setSyncDot('loading');
  try {
    const [projects, tasks, categories, settings] = await Promise.all([
      api('projects?select=*&order=position.asc'),
      api('tasks?select=*&order=position.asc'),
      api('categories?select=*'),
      api('settings?select=*')
    ]);
    // título del dashboard
    const titleSetting = settings.find(s => s.key === 'dashboard_title');
    if(titleSetting) document.getElementById('dash-title').textContent = titleSetting.value;
    cats = categories.map(c => c.name);
    ps = projects.map(p => ({
      ...p,
      tasks: sortTasks(tasks.filter(t => t.project_id === p.id)
        .sort((a,b) => a.position - b.position)
        .map(t => ({ id: t.id, text: t.text, done: t.done, dl: t.dl||null })))
    }));
    setSyncDot('ok');
    renderCatChips();
    renderCatFilters();
    render();
  } catch(e) {
    setSyncDot('err');
    console.error(e);
    document.getElementById('grid').innerHTML = '<div class="empty">Error conectando a la base de datos. Verifica tu conexión a internet.</div>';
  }
}

const pct = tasks => tasks.length ? Math.round(tasks.filter(t=>t.done).length/tasks.length*100) : 0;

function dlInfo(s) {
  if(!s) return null;
  const d = new Date(s+'T00:00:00');
  return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}

function setFSel(type, val) { fs[type] = val; render(); }

function renderCatFilters() {
  const el = document.getElementById('f-cat');
  if(!el) return;
  el.innerHTML = [['all','Todas'],...cats.map(c=>[c,c[0].toUpperCase()+c.slice(1)])].map(([v,l])=>
    `<option value="${v}" ${fs.c===v?'selected':''}>${l}</option>`).join('');
  el.value = fs.c;
}

function catChipHTML(c) {
  return `<div class="cat-chip"><span class="cat-chip-name" onclick="startRename('${c}',this)">${c}</span><button class="cat-chip-del" onclick="deleteCat('${c}')">×</button></div>`;
}

function renderCatChips() {
  const chips = document.getElementById('cat-chips');
  if(chips) chips.innerHTML = cats.map(c=>catChipHTML(c)).join('');
  const m = document.getElementById('cat-chips-main');
  if(m) m.innerHTML = cats.map(c=>catChipHTML(c)).join('');
  const sel = document.getElementById('mcat');
  if(sel) sel.innerHTML = cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}

async function startRename(c, el) {
  const inp = document.createElement('input');
  inp.className = 'cat-chip-input';
  inp.value = c;
  inp.style.width = Math.max(50, c.length*9)+'px';
  el.replaceWith(inp);
  inp.focus(); inp.select();
  const commit = async () => {
    const v = inp.value.trim();
    if(v && v !== c && !cats.includes(v)) {
      setSyncDot('loading');
      try {
        await api(`categories?name=eq.${encodeURIComponent(c)}`, 'DELETE');
        await api('categories', 'POST', {name: v});
        for(const p of ps.filter(p=>p.cat===c)) {
          await api(`projects?id=eq.${p.id}`, 'PATCH', {cat: v});
        }
        setSyncDot('ok');
        await loadAll();
      } catch(e) { setSyncDot('err'); renderCatChips(); }
    } else { renderCatChips(); }
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if(e.key==='Enter') inp.blur();
    if(e.key==='Escape') { inp.value=c; inp.blur(); }
  });
}

async function addCat() {
  const inp = document.getElementById('new-cat');
  const v = inp.value.trim();
  if(!v || cats.includes(v)) { inp.value=''; return; }
  setSyncDot('loading');
  try { await api('categories', 'POST', {name: v}); inp.value=''; setSyncDot('ok'); await loadAll(); }
  catch(e) { setSyncDot('err'); }
}

async function addCatMain() {
  const inp = document.getElementById('new-cat-main');
  const v = inp.value.trim();
  if(!v || cats.includes(v)) { inp.value=''; return; }
  setSyncDot('loading');
  try { await api('categories', 'POST', {name: v}); inp.value=''; setSyncDot('ok'); await loadAll(); }
  catch(e) { setSyncDot('err'); }
}

async function deleteCat(c) {
  if(cats.length <= 1) return;
  setSyncDot('loading');
  try {
    await api(`categories?name=eq.${encodeURIComponent(c)}`, 'DELETE');
    if(fs.c === c) fs.c = 'all';
    setSyncDot('ok'); await loadAll();
  } catch(e) { setSyncDot('err'); }
}

function toggleCatPanel() {
  const p = document.getElementById('cat-panel');
  const h = p.style.display === 'none';
  p.style.display = h ? 'block' : 'none';
  if(h) renderCatChips();
}

function render() {
  renderCatFilters();
  const grid = document.getElementById('grid');
  const openIds = new Set([...document.querySelectorAll('.card.open')].map(el=>el.id.replace('card-','')));
  const tot = ps.length, act = ps.filter(p=>p.status==='active').length;
  const totalTasks = ps.reduce((acc,p)=>acc+p.tasks.length,0), doneTasks = ps.reduce((acc,p)=>acc+p.tasks.filter(t=>t.done).length,0);
  document.getElementById('sub').textContent = `${tot} proyecto${tot!==1?'s':''} · ${act} activo${act!==1?'s':''} · ${doneTasks}/${totalTasks} tarea${totalTasks!==1?'s':''}`;
  const vis = ps.filter(p=>(fs.s==='all'||p.status===fs.s)&&(fs.c==='all'||p.cat===fs.c));
  if(!vis.length) { grid.innerHTML='<div class="empty">Sin resultados.</div>'; return; }
  grid.innerHTML = vis.map(p => {
    const pc = pct(p.tasks), dl = dlInfo(p.dl);
    const tasks = p.tasks.map(t=>`<div class="task-row" id="trow-${t.id}" draggable="true" data-tid="${t.id}" data-pid="${p.id}"><span class="drag-handle" title="Arrastrar">⠿</span><div class="cb ${t.done?'on':''}" onclick="toggle('${p.id}','${t.id}')"></div><span class="task-t ${t.done?'done':''}" onclick="renameTask(event,'${p.id}','${t.id}')">${t.text}</span><span class="task-date ${t.dl?'':'no-date'}" onclick="editTaskDate(event,'${p.id}','${t.id}')">${t.dl?fmtDate(t.dl):'+ fecha'}</span><button class="tdel" onclick="delTask('${p.id}','${t.id}')">×</button></div>`).join('');
    return `<div class="card" id="card-${p.id}" draggable="true" data-pid="${p.id}">
      <div class="card-main">
        <button class="col-toggle" id="tog-${p.id}" onclick="toggleCard('${p.id}',event)">+</button>
        <div class="card-name" onclick="startRenameProject(event,'${p.id}')">${p.name}</div>
        <div class="col-prog"><div class="prog-track"><div class="prog-fill" style="width:${pc}%"></div></div></div>
        <div class="col-count">${p.tasks.filter(t=>t.done).length}/${p.tasks.length}</div>
        <span class="meta-date" onclick="startEditDate(event,'${p.id}')"><svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2'/><line x1='16' y1='2' x2='16' y2='6'/><line x1='8' y1='2' x2='8' y2='6'/><line x1='3' y1='10' x2='21' y2='10'/></svg>${dl||nearestTaskDate(p)||'+ fecha'}</span>

        <select class="ssel" onchange="chStatus('${p.id}',this.value)" onclick="event.stopPropagation()">
          <option value="active" ${p.status==='active'?'selected':''}>Activo</option>
          <option value="paused" ${p.status==='paused'?'selected':''}>Pausado</option>
          <option value="done" ${p.status==='done'?'selected':''}>Completado</option>
        </select>
        <select class="csel-card" onchange="chCat('${p.id}',this.value)" onclick="event.stopPropagation()">
          ${cats.map(c=>`<option value="${c}" ${p.cat===c?'selected':''}>${c[0].toUpperCase()+c.slice(1)}</option>`).join('')}
        </select>
      </div>
      <div class="card-tasks">
        <div class="tasks">${tasks}</div>
        <div class="add-row">
          <input type="text" placeholder="+ Tarea" onkeydown="if(event.key==='Enter')addTask('${p.id}',this)"/>
          <button class="fdel" onclick="delProject('${p.id}')">− Eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');
  openIds.forEach(pid => {
    const card = document.getElementById('card-'+pid);
    if(card) { card.classList.add('open'); const btn=document.getElementById('tog-'+pid); if(btn) btn.textContent='−'; }
  });
}

function toggleCard(pid, e) {
  e.stopPropagation();
  const card = document.getElementById('card-'+pid);
  card.classList.toggle('open');
  const btn = document.getElementById('tog-'+pid);
  if(btn) btn.textContent = card.classList.contains('open') ? '−' : '+';
}

function startEditDate(e, pid) {
  const el = e.currentTarget;
  const p = ps.find(x=>x.id===pid);
  const inp = document.createElement('input');
  inp.type='date'; inp.className='meta-date-input'; inp.value=p.dl||'';
  el.replaceWith(inp); inp.focus(); inp.showPicker&&inp.showPicker();
  let committed = false;
  const commit = async () => {
    if(committed) return; committed=true;
    p.dl = inp.value||null;
    const newSpan = document.createElement('span');
    newSpan.className='meta-date';
    newSpan.onclick=(ev)=>startEditDate(ev,pid);
    newSpan.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'+(dlInfo(p.dl)||'+ fecha');
    inp.replaceWith(newSpan);
    setSyncDot('loading');
    try { await api(`projects?id=eq.${pid}`, 'PATCH', {dl: p.dl}); setSyncDot('ok'); }
    catch(e) { setSyncDot('err'); }
  };
  inp.addEventListener('change', ()=>{inp.blur();});
  inp.addEventListener('blur', commit);
}

function startRenameProject(e, pid) {
  const el = e.currentTarget;
  el.contentEditable='true'; el.style.whiteSpace='normal'; el.style.overflow='visible'; el.focus();
  const range = document.createRange(); range.selectNodeContents(el); range.collapse(false);
  const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  const commit = async () => {
    el.contentEditable='false'; el.style.whiteSpace='nowrap'; el.style.overflow='hidden';
    const v = el.textContent.trim();
    if(v) {
      const p = ps.find(x=>x.id===pid);
      if(p && p.name !== v) {
        p.name = v;
        setSyncDot('loading');
        try { await api(`projects?id=eq.${pid}`, 'PATCH', {name: v}); setSyncDot('ok'); }
        catch(e) { setSyncDot('err'); }
      }
    } else { const p=ps.find(x=>x.id===pid); if(p) el.textContent=p.name; }
  };
  el.addEventListener('blur', commit, {once:true});
  el.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();el.blur();} if(e.key==='Escape'){el.textContent=ps.find(x=>x.id===pid)?.name||'';el.blur();} });
}

function renameTask(e, pid, tid) {
  e.stopPropagation();
  const el = e.currentTarget;
  if(el.contentEditable==='true') return;
  const p = ps.find(x=>x.id===pid);
  const t = p.tasks.find(x=>x.id===tid);
  el.contentEditable='true'; el.focus();
  const range=document.createRange(); range.selectNodeContents(el); range.collapse(false);
  const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  const commit = async () => {
    el.contentEditable='false';
    const v = el.textContent.trim();
    if(v && v !== t.text) {
      t.text = v;
      setSyncDot('loading');
      try { await api(`tasks?id=eq.${tid}`, 'PATCH', {text: v}); setSyncDot('ok'); }
      catch(e) { setSyncDot('err'); }
    } else { el.textContent = t.text; }
  };
  el.addEventListener('blur', commit, {once:true});
  el.addEventListener('keydown', ev=>{ if(ev.key==='Enter'){ev.preventDefault();el.blur();} if(ev.key==='Escape'){el.textContent=t.text;el.blur();} });
}

async function toggle(pid, tid) {
  const p = ps.find(x=>x.id===pid);
  const t = p.tasks.find(x=>x.id===tid);
  t.done ^= 1;
  sortTasks(p.tasks);
  render();
  setSyncDot('loading');
  try { await api(`tasks?id=eq.${tid}`, 'PATCH', {done: !!t.done}); setSyncDot('ok'); }
  catch(e) { setSyncDot('err'); }
}

async function delTask(pid, tid) {
  const p = ps.find(x=>x.id===pid);
  p.tasks = p.tasks.filter(x=>x.id!==tid);
  render();
  setSyncDot('loading');
  try { await api(`tasks?id=eq.${tid}`, 'DELETE'); setSyncDot('ok'); }
  catch(e) { setSyncDot('err'); }
}

async function addTask(pid, inp) {
  const v = inp.value.trim();
  if(!v) return;
  const p = ps.find(x=>x.id===pid);
  const id = uid();
  const pos = p.tasks.length;
  p.tasks.push({id, text:v, done:false, dl:null});
  inp.value = '';
  render();
  setSyncDot('loading');
  try { await api('tasks', 'POST', {id, project_id:pid, text:v, done:false, position:pos}); setSyncDot('ok'); }
  catch(e) { setSyncDot('err'); }
}

async function chStatus(pid, s) {
  ps.find(x=>x.id===pid).status = s; render();
  setSyncDot('loading');
  try { await api(`projects?id=eq.${pid}`, 'PATCH', {status: s}); setSyncDot('ok'); }
  catch(e) { setSyncDot('err'); }
}

async function chCat(pid, c) {
  ps.find(x=>x.id===pid).cat = c; render();
  setSyncDot('loading');
  try { await api(`projects?id=eq.${pid}`, 'PATCH', {cat: c}); setSyncDot('ok'); }
  catch(e) { setSyncDot('err'); }
}

async function delProject(pid) {
  if(!confirm('¿Eliminar este proyecto?')) return;
  ps = ps.filter(x=>x.id!==pid); render();
  setSyncDot('loading');
  try { await api(`projects?id=eq.${pid}`, 'DELETE'); setSyncDot('ok'); }
  catch(e) { setSyncDot('err'); }
}

function openModal() { renderCatChips(); document.getElementById('overlay').classList.add('open'); document.getElementById('mn').focus(); }
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  ['mn','md'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mp').value='high'; document.getElementById('ms').value='active';
}

async function create() {
  const name = document.getElementById('mn').value.trim();
  if(!name) return;
  const id = uid();
  const newP = { id, name, cat: document.getElementById('mcat').value, status: document.getElementById('ms').value, dl: document.getElementById('md').value||null, tasks: [] };
  ps.push(newP);
  closeModal(); render();
  setSyncDot('loading');
  try { await api('projects', 'POST', {id, name:newP.name, cat:newP.cat, status:newP.status, dl:newP.dl}); setSyncDot('ok'); }
  catch(e) { setSyncDot('err'); }
}

// ── Helpers de fecha ───────────────────────────────────────────────
function fmtDate(s) {
  if(!s) return '';
  const d = new Date(s+'T00:00:00');
  return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}

function nearestTaskDate(p) {
  const dates = p.tasks.filter(t=>!t.done && t.dl).map(t=>t.dl).sort();
  return dates.length ? fmtDate(dates[0]) : null;
}

// ── Título editable ────────────────────────────────────────────────
function startRenameTitle(e) {
  const el = e.currentTarget;
  if(el.contentEditable==='true') return;
  const prev = el.textContent;
  el.contentEditable='true'; el.focus();
  const range=document.createRange(); range.selectNodeContents(el); range.collapse(false);
  window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
  const commit = async () => {
    el.contentEditable='false';
    const v = el.textContent.trim();
    if(!v) { el.textContent = prev; return; }
    if(v === prev) return;
    setSyncDot('loading');
    try {
      await api('settings?key=eq.dashboard_title', 'PATCH', {value: v});
      setSyncDot('ok');
    } catch(e) { setSyncDot('err'); el.textContent = prev; }
  };
  el.addEventListener('blur', commit, {once:true});
  el.addEventListener('keydown', ev=>{ if(ev.key==='Enter'){ev.preventDefault();el.blur();} if(ev.key==='Escape'){el.textContent=prev;el.blur();} });
}

// ── Fecha de tarea ─────────────────────────────────────────────────
function editTaskDate(e, pid, tid) {
  e.stopPropagation();
  const el = e.currentTarget;
  const p = ps.find(x=>x.id===pid);
  const t = p.tasks.find(x=>x.id===tid);
  const inp = document.createElement('input');
  inp.type='date'; inp.className='task-date-input'; inp.value=t.dl||'';
  el.replaceWith(inp); inp.focus(); inp.showPicker&&inp.showPicker();
  let committed=false;
  const commit = async () => {
    if(committed) return; committed=true;
    t.dl = inp.value||null;
    sortTasks(p.tasks);
    render();
    setSyncDot('loading');
    try {
      await api(`tasks?id=eq.${tid}`, 'PATCH', {dl: t.dl});
      await Promise.all(p.tasks.map((t,i)=>api(`tasks?id=eq.${t.id}`,'PATCH',{position:i})));
      setSyncDot('ok');
    }
    catch(e){ setSyncDot('err'); }
  };
  inp.addEventListener('change', ()=>inp.blur());
  inp.addEventListener('blur', commit);
}

// ── Drag & drop — Tareas ───────────────────────────────────────────
let dragTask = null;

document.addEventListener('dragstart', e => {
  const row = e.target.closest('.task-row');
  if(row) { dragTask={tid:row.dataset.tid, pid:row.dataset.pid}; row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; return; }
  const card = e.target.closest('.card[data-pid]');
  if(card) { dragProj=card.dataset.pid; card.classList.add('proj-dragging'); e.dataTransfer.effectAllowed='move'; }
});

document.addEventListener('dragend', e => {
  document.querySelectorAll('.task-row.dragging,.task-row.drag-over').forEach(el=>el.classList.remove('dragging','drag-over'));
  document.querySelectorAll('.card.proj-dragging,.card.proj-drag-over-top,.card.proj-drag-over-bot').forEach(el=>el.classList.remove('proj-dragging','proj-drag-over-top','proj-drag-over-bot'));
  dragTask=null; dragProj=null;
});

document.addEventListener('dragover', e => {
  e.preventDefault();
  // tasks
  const row = e.target.closest('.task-row');
  if(row && dragTask) {
    document.querySelectorAll('.task-row.drag-over').forEach(el=>el.classList.remove('drag-over'));
    if(row.dataset.tid !== dragTask.tid) row.classList.add('drag-over');
    return;
  }
  // projects
  const card = e.target.closest('.card[data-pid]');
  if(card && dragProj && card.dataset.pid !== dragProj) {
    document.querySelectorAll('.card.proj-drag-over-top,.card.proj-drag-over-bot').forEach(el=>el.classList.remove('proj-drag-over-top','proj-drag-over-bot'));
    const rect=card.getBoundingClientRect();
    card.classList.add(e.clientY < rect.top+rect.height/2 ? 'proj-drag-over-top':'proj-drag-over-bot');
  }
});

document.addEventListener('drop', async e => {
  e.preventDefault();
  // drop tarea
  const row = e.target.closest('.task-row');
  if(row && dragTask && row.dataset.tid !== dragTask.tid && row.dataset.pid === dragTask.pid) {
    const p = ps.find(x=>x.id===dragTask.pid);
    const fromIdx = p.tasks.findIndex(t=>t.id===dragTask.tid);
    const toIdx   = p.tasks.findIndex(t=>t.id===row.dataset.tid);
    const [moved] = p.tasks.splice(fromIdx,1);
    p.tasks.splice(toIdx,0,moved);
    render();
    // actualizar posiciones en bd
    setSyncDot('loading');
    try {
      await Promise.all(p.tasks.map((t,i)=>api(`tasks?id=eq.${t.id}`,'PATCH',{position:i})));
      setSyncDot('ok');
    } catch(e){ setSyncDot('err'); }
    return;
  }
  // drop proyecto
  const card = e.target.closest('.card[data-pid]');
  if(card && dragProj && card.dataset.pid !== dragProj) {
    const fromIdx = ps.findIndex(x=>x.id===dragProj);
    const toIdx   = ps.findIndex(x=>x.id===card.dataset.pid);
    const rect=card.getBoundingClientRect();
    const insertAfter = e.clientY >= rect.top+rect.height/2;
    const [moved] = ps.splice(fromIdx,1);
    const finalIdx = ps.findIndex(x=>x.id===card.dataset.pid);
    ps.splice(insertAfter ? finalIdx+1 : finalIdx, 0, moved);
    render();
    // actualizar posición proyectos en bd (si la tabla tiene columna position)
    setSyncDot('loading');
    try {
      await Promise.all(ps.map((p,i)=>api(`projects?id=eq.${p.id}`,'PATCH',{position:i})));
      setSyncDot('ok');
    } catch(er){ setSyncDot('err'); }
  }
});

function toggleAll() {
  const cards = document.querySelectorAll('.card');
  const allOpen = [...cards].every(c => c.classList.contains('open'));
  const btn = document.getElementById('btn-expand');
  cards.forEach(card => {
    const pid = card.id.replace('card-', '');
    const btn2 = document.getElementById('tog-' + pid);
    if(allOpen) {
      card.classList.remove('open');
      if(btn2) btn2.textContent = '+';
    } else {
      card.classList.add('open');
      if(btn2) btn2.textContent = '−';
    }
  });
  btn.textContent = allOpen ? '+ Expandir' : '− Colapsar';
}

document.getElementById('overlay').addEventListener('click', e=>{ if(e.target===document.getElementById('overlay')) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
loadAll();
